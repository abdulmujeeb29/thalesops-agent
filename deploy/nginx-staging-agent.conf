server {
    listen 80;
    server_name staging-agent.thalesops.com;

    root /home/thalesops-agent;
    index index.html;

    # install.sh — served with correct content-type for piping to bash
    location = /install.sh {
        default_type text/plain;
        try_files $uri =404;
    }

    # Binary releases directory
    location /releases/ {
        autoindex off;
        try_files $uri =404;
    }

    # Block everything else
    location / {
        return 404;
    }
}
